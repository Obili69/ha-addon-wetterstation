<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wetterstation Guldistückli</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #d29922;
      --radius:    10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.3rem; font-weight: 600; }
    header h1 span { color: var(--accent); }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--yellow); transition: background .4s; }
    #status-dot.online  { background: var(--green); }
    #status-dot.offline { background: var(--red); }

    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    .station-title { font-size: .85rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 1rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      position: relative;
      user-select: none;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card.no-chart { cursor: default; }
    .card.no-chart:hover { transform: none; border-color: var(--border); }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .card-label { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .card-value span.unit { font-size: 1rem; font-weight: 400; color: var(--muted); margin-left: .2em; }
    .card-ts { font-size: .7rem; color: var(--muted); margin-top: .5rem; }

    .badge-offline {
      background: var(--red); color: #fff;
      font-size: .6rem; padding: .15rem .4rem;
      border-radius: 4px; font-weight: 600;
      display: none; flex-shrink: 0; margin-left: .4rem;
    }
    .card.offline .badge-offline { display: inline-block; }
    .card.offline .card-value { opacity: .4; }

    /* compass */
    .compass-wrap { display: flex; align-items: center; gap: .75rem; margin-top: .25rem; }
    .compass { width: 44px; height: 44px; flex-shrink: 0; }
    .compass-deg { font-size: 1.8rem; font-weight: 700; line-height: 1; }
    .compass-deg span.unit { font-size: .9rem; font-weight: 400; color: var(--muted); }

    /* Modal */
    #modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal-backdrop.open { display: flex; }
    #modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); width: min(860px, 95vw);
      padding: 1.5rem; position: relative;
    }
    #modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
    #modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--muted);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    #modal-close:hover { color: var(--text); }
    .range-btns { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .range-btn {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--muted); padding: .3rem .8rem; border-radius: 6px;
      cursor: pointer; font-size: .8rem; transition: all .15s;
    }
    .range-btn.active { border-color: var(--accent); color: var(--accent); }
    #chart-wrap { position: relative; height: 300px; }
  </style>
</head>
<body>

<header>
  <h1>Wetterstation <span>Guldistückli</span></h1>
  <div id="status-dot" title="WebSocket Verbindung"></div>
</header>

<main id="main"></main>

<!-- Modal -->
<div id="modal-backdrop">
  <div id="modal">
    <div id="modal-title"></div>
    <button id="modal-close">✕</button>
    <div class="range-btns">
      <button class="range-btn active" data-range="24h">24h</button>
      <button class="range-btn" data-range="7d">7 Tage</button>
      <button class="range-btn" data-range="30d">30 Tage</button>
      <button class="range-btn" data-range="1y">1 Jahr</button>
    </div>
    <div id="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
